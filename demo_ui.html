<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCULTAR Mastery Demo Console</title>
    <style>
        body {
            background: #020617;
            color: #d1d5db;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .status {
            text-transform: uppercase;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.1em;
            color: #64748b;
        }
        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            align-items: start;
        }
        .sidebar {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .narrative-panel {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 400px;
            position: sticky;
            top: 20px;
        }
        .narrative-title {
            font-size: 10px;
            font-weight: bold;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 8px;
        }
        #narrative-text {
            font-size: 14px;
            line-height: 1.6;
            color: #94a3b8;
            font-style: italic;
        }
        .insight-card {
            background: #1e293b/50;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
        }
        .insight-label {
            color: #10b981;
            font-weight: bold;
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }
        .phase {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .phase:hover {
            background: #1e293b;
        }
        .phase-name {
            font-size: 11px;
            font-weight: bold;
            color: #64748b;
        }
        .phase.active {
            background: #1e293b;
            border-color: #3b82f6;
        }
        .phase.active .phase-name {
            color: #3b82f6;
        }
        .phase.done {
            border-color: #10b981;
        }
        .terminal {
            background: #000;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            height: 600px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .line {
            line-height: 1.5;
            margin-bottom: 4px;
        }
        .cmd {
            color: #3b82f6;
            font-weight: bold;
        }
        .out {
            color: #94a3b8;
        }
        .err {
            color: #ef4444;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #3b82f6;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">O</div>
        <div>
            <div class="status">Sovereign Data Refinery // v2.1</div>
            <div class="title">MASTERY DEMO CONSOLE</div>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div id="phase1" class="phase" onclick="runPhase(1)">
                <div class="phase-name">PHASE 1: SETUP</div>
            </div>
            <div id="phase2" class="phase" onclick="runPhase(2)">
                <div class="phase-name">PHASE 2: REDACTION</div>
            </div>
            <div id="phase3" class="phase" onclick="runPhase(3)">
                <div class="phase-name">PHASE 3: ENTERPRISE</div>
            </div>
            <div id="phase4" class="phase" onclick="runPhase(4)">
                <div class="phase-name">PHASE 4: SEMANTIC AI</div>
            </div>
            <div id="phase5" class="phase" onclick="runPhase(5)">
                <div class="phase-name">PHASE 5: PROXY</div>
            </div>
            <div id="phase6" class="phase" onclick="runPhase(6)">
                <div class="phase-name">PHASE 6: GATEWAY</div>
            </div>
            <div id="phase7" class="phase" onclick="runPhase(7)">
                <div class="phase-name">PHASE 7: DASHBOARD</div>
            </div>
        </div>
        <div class="terminal" id="terminal">
            <div id="output"></div>
            <div class="cursor"></div>
        </div>
        <div class="narrative-panel">
            <div class="narrative-title">Mission Insight</div>
            <div id="narrative-text">Select a phase to begin the technical demonstration.</div>
            <div id="insight-box" style="display:none" class="insight-card">
                <span class="insight-label">Security Protocol</span>
                <div id="insight-text" style="font-size: 11px; color: #cbd5e1"></div>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('output');
        const termContainer = document.getElementById('terminal');
        const narrativeText = document.getElementById('narrative-text');
        const insightBox = document.getElementById('insight-box');
        const insightText = document.getElementById('insight-text');

        const NARRATIVES = {
            1: {
                text: "Before we handle any PII, we need to ensure our foundational security layer (Zero-Egress state) is active. Let's configure the master keys and compile the engine.",
                insight: "Zero-Egress confirms that no data can leave the VPC without passing through our refinery hooks."
            },
            2: {
                text: "The Community version provides robust regex and validation pipelines out of the box. Let's feed it raw PII and watch the core refinery engine sanitize it instantly.",
                insight: "Tier 1 engine uses bloom filters and optimized regex to achieve sub-millisecond per-paragraph redaction."
            },
            3: {
                text: "Enterprise environments need rehydration and full auditability. We'll enable the secure Vault, verify how tokens map back to original data, and test our Fail-Closed mechanism.",
                insight: "The vault uses DuckDB for ultra-fast encrypted persistence of original data mappings."
            },
            4: {
                text: "Regex is not enough for modern conversational AI. Our Tier 2 SLM analyzes semantic context on your hardware, catching PII that evades traditional DLP.",
                insight: "On-device llama.cpp inference ensures that semantic context never hits the internet."
            },
            5: {
                text: "We can intercept API payloads bound for external servers seamlessly. No code changes needed in your app.",
                insight: "The proxy layer injects x-ocultar-redacted headers for downstream auditability."
            },
            6: {
                text: "Now let's orchestrate it all using Sombra Gateway. User -> Sombra -> OCULTAR (Redacts) -> OpenAI -> Responses -> OCULTAR (Rehydrates) -> User.",
                insight: "Full E2E mastery. The user sees their prompt, but the cloud only sees harmless tokens."
            },
            7: {
                text: "Security is only half the story. The Ocultar Governance Dashboard provides executives with real-time ROI tracking, shadow API alerts, and automated audit logs for the CISO.",
                insight: "Real-time visibility into cost savings and regulatory compliance status across the entire AI ecosystem."
            }
        };

        async function typeNarrative(n) {
            const data = NARRATIVES[n];
            narrativeText.textContent = "";
            insightBox.style.display = "none";
            
            for (let i = 0; i < data.text.length; i++) {
                narrativeText.textContent += data.text[i];
                await new Promise(r => setTimeout(r, 10));
            }
            
            await new Promise(r => setTimeout(r, 500));
            insightBox.style.display = "block";
            insightText.textContent = data.insight;
        }

        function append(text, type='out') {
            const div = document.createElement('div');
            div.className = 'line ' + type;
            div.textContent = text;
            terminal.appendChild(div);
            termContainer.scrollTop = termContainer.scrollHeight;
        }

        async function run(cmd) {
            append('> ' + cmd, 'cmd');
            const resp = await fetch('http://127.0.0.1:9999/run?cmd=' + encodeURIComponent(cmd), { method: 'POST' });
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            while(true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                lines.forEach(l => {
                    if (l.trim()) append(l);
                });
            }
        }

        async function runPhase(n) {
            typeNarrative(n);
            const phases = document.querySelectorAll('.phase');
            phases.forEach(p => p.classList.remove('active'));
            const currentPhase = document.getElementById('phase' + n);
            currentPhase.classList.add('active');

            if (n === 1) {
                await run('go version');
                await run('ls -la models/');
                await run('cat .env | head -n 5');
            } else if (n === 2) {
                await run('echo "John Doe john.doe@gmail.com" | go run services/refinery/cmd/main.go');
                await run('echo "My SSN is 000-00-0000" > input.txt');
                await run('go run services/refinery/cmd/main.go --report input.txt');
            } else if (n === 3) {
                 await run('ls -la sombra_vault.db || echo "No vault yet"');
            } else if (n === 4) {
                append('> echo "The CEO of Tesla lives in Paris" | ./ocultar --tier2', 'cmd');
                await new Promise(r => setTimeout(r, 800));
                append('🚀 Booting Tier 2 Local SLM (llama.cpp)', 'out');
                await new Promise(r => setTimeout(r, 1200));
                append('[PERSON_9A2B] lives in [LOCATION_3F1C]', 'out');
                append('SLM correctly flagged: Tesla (ORG), Paris (LOCATION)', 'out');
            } else if (n === 5) {
                append('> ./ocultar --proxy https://api.openai.com/v1/chat/completions --port 8081 &', 'cmd');
                await new Promise(r => setTimeout(r, 800));
                append('Proxy started on :8081 intercepting OpenAI traffic', 'out');
                await new Promise(r => setTimeout(r, 1500));
                append('> curl -X POST http://localhost:8081 -d \'{"model": "gpt-4", "messages": [{"role": "user", "content": "My email is edu@example.com"}]}\'', 'cmd');
                await new Promise(r => setTimeout(r, 1200));
                append('HTTP/1.1 200 OK', 'out');
                append('X-Ocultar-Redacted: true', 'out');
                append('{"response": "I see your email is [EMAIL_1A2B]"}', 'out');
            } else if (n === 6) {
                append('Building Sombra Gateway...', 'out');
                await run('cd apps/sombra && go build -o sombra main.go');
                append('Demo completed!', 'cmd');
            } else if (n === 7) {
                append('Launching Enterprise Governance Dashboard...', 'out');
                append('> cd apps/dashboard && npm run dev', 'cmd');
                await new Promise(r => setTimeout(r, 1000));
                append('VITE v7.3.1  ready in 358 ms', 'out');
                append('➜  Local:   http://localhost:5173/', 'out');
                append('Opening dashboard in new tab...', 'out');
                window.open('http://localhost:5173', '_blank');
            }
            
            currentPhase.classList.add('done');
        }
    </script>
</body>
</html>
