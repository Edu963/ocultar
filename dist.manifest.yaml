# Ocultar Distribution Manifest
# This file defines the files and binaries included in Ocultar releases.
# It is used by the client-package-updater skill and the build_release.sh script.

version: "2.1.1"

distributions:
  community:
    name: "ocultar-community"
    format: "zip"
    components:
      - name: "refinery"
        src: "./services/refinery/cmd/main.go"
        type: "go-binary"
        dest: "ocultar"
      - name: "dashboard"
        src: "./apps/web"
        type: "npm-build"
        dest: "dashboard"
      - name: "docker-compose"
        src: "./docker-compose.community.yml"
        type: "file"
        dest: "docker-compose.yml"
      - name: "env-example"
        src: "./.env.example"
        type: "file"
        dest: ".env.example"
      - name: "scripts"
        src: "./tools/scripts/scripts"
        type: "directory"
        include:
          - "setup-community.sh"
          - "setup-community.ps1"
          - "integrity_validator.sh"
          - "run_secret_scanner.sh"
          - "run_arch_linter.sh"
          - "run_zero_egress_validator.sh"
        dest: "scripts/"

  enterprise:
    name: "ocultar-enterprise"
    format: "tar.gz"
    extends: "community"
    components:
      - name: "enterprise-refinery"
        src: "./enterprise/refinery-extensions/cmd/ocultar-enterprise/main.go"
        type: "go-binary"
        dest: "ocultar-enterprise"
        optional: true
      - name: "config-template"
        src: "./services/refinery/configs/config.yaml"
        type: "file"
        dest: "config.yaml"
      - name: "enterprise-scripts"
        src: "./tools/scripts/scripts"
        type: "directory"
        include:
          - "setup-enterprise.sh"
          - "integrity_validator.sh"
          - "run_secret_scanner.sh"
          - "run_arch_linter.sh"
          - "run_zero_egress_validator.sh"
        dest: "scripts/"
      - name: "mock-api"
        src: "./services/mock-api/main.go"
        type: "go-binary"
        dest: "mock-api"
        optional: true

# Mandatory Security Checks for all components
security:
  sanitization: true
  egress_audit: true
  license_enforcement: true
  cryptographic_gating: true

# Validation Profiles
validation:
  community:
    test_script: "scripts/setup-community.sh"
    distribution_type: "community"
    allowed_ports: [8081, 3000]
    required_signatures: ["ocultar-community.zip.sig"]
  enterprise:
    test_script: "scripts/setup-enterprise.sh"
    distribution_type: "enterprise"
    allowed_ports: [8081, 3001]
    required_signatures: ["ocultar-enterprise.tar.gz.sig"]
